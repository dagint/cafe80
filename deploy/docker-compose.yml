# RustDesk hbbs (ID/rendezvous) + hbbr (relay) + Caddy reverse proxy
# Relay host: RUSTDESK_RELAY_HOST is written to .env on the server by the deploy workflow.
# Image: defaults to Pro (licensed). Override RUSTDESK_IMAGE_REPO in .env to switch images.
# Tag: default 1.8.2; override with RUSTDESK_IMAGE in .env (workflow uses this for rollback).
# Pro web console proxied via Caddy (HTTPS on :443 → localhost:21114).

services:
  caddy:
    image: caddy:2-alpine
    container_name: rustdesk-caddy
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - RUSTDESK_RELAY_HOST=${RUSTDESK_RELAY_HOST:-localhost}
    depends_on:
      - hbbs
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
  hbbs:
    image: ${RUSTDESK_IMAGE_REPO:-rustdesk/rustdesk-server-pro}:${RUSTDESK_IMAGE:-1.8.2}
    container_name: rustdesk-hbbs
    command: hbbs -r ${RUSTDESK_RELAY_HOST:-relay}:21117
    volumes:
      - ./data:/root
    network_mode: host
    depends_on:
      - hbbr
    restart: unless-stopped
    # Security: drop all caps, no new privileges (adjust if image needs more)
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
  hbbr:
    image: ${RUSTDESK_IMAGE_REPO:-rustdesk/rustdesk-server-pro}:${RUSTDESK_IMAGE:-1.8.2}
    container_name: rustdesk-hbbr
    command: hbbr
    volumes:
      - ./data:/root
    network_mode: host
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

volumes:
  caddy_data:
  caddy_config:
